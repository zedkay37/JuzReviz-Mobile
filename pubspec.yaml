name: juzreviz
description: "JuzReviz - Le Coran qui vit dans ta journee"
publish_to: 'none'
version: 1.0.1+2

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  cupertino_icons: ^1.0.8
  flutter_riverpod: ^2.5.1
  go_router: ^14.6.2
  path_provider: ^2.1.5
  just_audio: ^0.9.42
  just_audio_background: ^0.0.1-beta.13
  http: ^1.2.2
  scrollable_positioned_list: ^0.3.8
  flutter_local_notifications: ^18.0.1
  timezone: ^0.9.4
  flutter_timezone: ^3.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/corpus/
    - assets/corpus/surah/
    - assets/tafsir/fr/
    - assets/tafsir/en/
    - assets/mushaf/pages.json

  fonts:
    - family: AmiriQuran
      fonts:
        - asset: assets/fonts/AmiriQuran-Regular.ttf
