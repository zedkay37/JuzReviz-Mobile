name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  analyze-test-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - run: flutter pub get
      - name: Regenerate corpus (idempotence guard)
        run: |
          if [ -d "../JuzReviz2" ]; then dart run tools/build_corpus/build_corpus.dart --source ../JuzReviz2; fi
      - run: flutter analyze
      - run: flutter test
      - run: flutter build apk --debug
